<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{message_subject}}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #1a1c20;
        font-family: 'Nunito', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      }
      .container {
        max-width: 600px;
        margin: 40px auto;
        background-color: #2f3339;
        color: #ffffff;
        border-radius: 8px;
        overflow: hidden;
      }
      .header {
        padding: 30px 20px;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .content {
        padding: 40px 30px;
        color: #ffffff;
        line-height: 1.6;
        text-align: center;
      }
      .footer {
        padding: 20px;
        text-align: center;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
        background-color: #25282d;
      }
      h2 { margin-top: 0; font-size: 24px; font-weight: 800; }
    </style>
  </head>
  <body>
    <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #1a1c20;">
      <tr>
        <td align="center" style="padding: 20px 0;">
          <table role="presentation" class="container" width="600" border="0" cellspacing="0" cellpadding="0">
            <tr>
              <td class="header">
                <img src="cid:logo" alt="NexusHub Logo" style="display: block; margin: 0 auto; border: 0; max-height: 60px; max-width: 200px; width: auto; height: auto;" />
              </td>
            </tr>
            <tr>
              <td class="content">
                <h2>Tienes un nuevo mensaje</h2>
                <p>Hola <strong>{{username}}</strong>,</p>
                <div style="text-align: left; margin: 25px 0; font-size: 16px; font-weight: 300; line-height: 1.8;">
                    {{message_body}}
                </div>
                
                {{original_message_html}}

                <p style="font-size: 14px; margin-top: 40px; color: rgba(255, 255, 255, 0.7);">
                  Saludos cordiales,<br>El equipo de NexusHub
                </p>
              </td>
            </tr>
            <tr>
              <td class="footer">
                <p>&copy; {{year}} NexusHub S.A.C. Todos los derechos reservados.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
